# SPDX-License-Identifier: Apache-2.0
version: 2

project_name: deepspan-server

before:
  hooks:
    - go mod tidy

builds:
  - id: server
    main: ./cmd/server
    binary: deepspan-server
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: server
    name_template: "deepspan-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

dockers:
  - image_templates:
      - "ghcr.io/myorg/deepspan-server:{{ .Tag }}"
      - "ghcr.io/myorg/deepspan-server:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64,linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"

checksum:
  name_template: "deepspan-server_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
