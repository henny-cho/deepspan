# SPDX-License-Identifier: Apache-2.0
name: Setup C++ build environment
description: Install CMake deps and configure ccache

inputs:
  preset:
    required: true

runs:
  using: composite
  steps:
    - name: Install system deps
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build liburing-dev libgtest-dev pkg-config

    - name: Install spdlog (system deps preset)
      if: ${{ inputs.preset == 'dev' }}
      shell: bash
      run: sudo apt-get install -y --no-install-recommends libspdlog-dev

    - name: Install deepspan-codegen (hwip preset)
      if: ${{ inputs.preset == 'dev-hwip' }}
      shell: bash
      working-directory: tools/deepspan-codegen
      run: pip install --break-system-packages -e .

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: cpp-${{ inputs.preset }}-${{ runner.os }}
        max-size: 400M
