# SPDX-License-Identifier: Apache-2.0
name: CI / C++

on:
  push:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'l3/hw-model/**'
      - 'l3/userlib/**'
      - 'l3/appframework/**'
      - 'l2/kernel/include/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-cpp.yml'
      - '.github/actions/setup-cpp-build/**'
  pull_request:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'l3/hw-model/**'
      - 'l3/userlib/**'
      - 'l3/appframework/**'
      - 'l2/kernel/include/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/actions/setup-cpp-build/**'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, dev-submodule, dev-hwip]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-cpp-build
        with:
          preset: ${{ matrix.preset }}

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
          if-no-files-found: ignore
