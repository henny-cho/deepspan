# SPDX-License-Identifier: Apache-2.0
name: CI / C++

on:
  push:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'sim/**'
      - 'runtime/**'
      - 'server/**'
      - 'kernel/include/**'
      - 'api/proto/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-cpp.yml'
      - '.github/actions/setup-cpp-build/**'
  pull_request:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'sim/**'
      - 'runtime/**'
      - 'server/**'
      - 'kernel/include/**'
      - 'api/proto/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/actions/setup-cpp-build/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, dev-submodule, dev-hwip, dev-crc32]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-cpp-build
        with:
          preset: ${{ matrix.preset }}

      - name: Build & Test (${{ matrix.preset }})
        run: ./scripts/dev.sh check --preset ${{ matrix.preset }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
          if-no-files-found: ignore
