# SPDX-License-Identifier: Apache-2.0
name: CI / C++


on:
  push:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'userlib/**'
      - 'appframework/**'
      - 'kernel/include/**'
      - 'hwip/**'
      - 'CMakePresets.json'
      - '.github/workflows/ci-cpp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'userlib/**'
      - 'appframework/**'
      - 'kernel/include/**'
      - 'hwip/**'
      - 'CMakePresets.json'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.hwip }}, ${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        hwip: [accel, codec]
        preset: [dev]
        include:
          # dev-submodule only runs for accel (reference hwip type)
          - hwip: accel
            preset: dev-submodule

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build liburing-dev libgtest-dev pkg-config

      - name: Install Conan
        if: matrix.preset == 'dev'
        run: |
          sudo apt-get install -y --no-install-recommends pipx
          pipx install "conan>=2,<3"
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Conan profile
        if: matrix.preset == 'dev'
        run: conan profile detect --force

      - name: Configure CMake (${{ matrix.hwip }}, ${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -DDEEEPSPAN_HWIP_TYPE=${{ matrix.hwip }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cpp-test-results-${{ matrix.hwip }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
