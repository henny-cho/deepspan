# SPDX-License-Identifier: Apache-2.0
name: CI / C++

on:
  push:
    branches: [main]
    paths:
      - 'l3-hw-model/**'
      - 'l3-userlib/**'
      - 'l3-appframework/**'
      - 'l2-kernel/include/**'
      - 'CMakePresets.json'
      - '.github/workflows/ci-cpp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'l3-hw-model/**'
      - 'l3-userlib/**'
      - 'l3-appframework/**'
      - 'l2-kernel/include/**'
      - 'CMakePresets.json'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, dev-submodule]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build liburing-dev libgtest-dev pkg-config

      - name: Install Conan
        if: matrix.preset == 'dev'
        run: |
          sudo apt-get install -y --no-install-recommends pipx
          pipx install "conan>=2,<3"
          pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Conan profile
        if: matrix.preset == 'dev'
        run: conan profile detect --force

      - name: Install Conan dependencies
        if: matrix.preset == 'dev'
        run: |
          conan install . \
            --output-folder=build/dev \
            --build=missing \
            -s build_type=Debug

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
          if-no-files-found: ignore
