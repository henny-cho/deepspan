# SPDX-License-Identifier: Apache-2.0
name: CI / C++

on:
  push:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'userlib/**'
      - 'appframework/**'
      - 'kernel/include/**'
      - '.github/workflows/ci-cpp.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'userlib/**'
      - 'appframework/**'
      - 'kernel/include/**'

jobs:
  build-and-test:
    name: Build & Test (C++)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: [dev, dev-submodule]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build liburing-dev libgtest-dev pkg-config

      - name: Install Conan
        if: matrix.preset == 'dev'
        run: pip install conan==2.*

      - name: Configure Conan profile
        if: matrix.preset == 'dev'
        run: conan profile detect --force

      - name: Configure CMake (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} -S deepspan

      - name: Build
        run: cmake --build build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.preset }}
          path: build/Testing/
