# SPDX-License-Identifier: Apache-2.0
name: CI / C++

on:
  push:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'sim/**'
      - 'runtime/**'
      - 'server/**'
      - 'kernel/include/**'
      - 'api/proto/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci-cpp.yml'
      - '.github/actions/setup-cpp-build/**'
  pull_request:
    branches: [main]
    paths:
      - 'hwip/**'
      - 'sim/**'
      - 'runtime/**'
      - 'server/**'
      - 'kernel/include/**'
      - 'api/proto/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/actions/setup-cpp-build/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Opt in to Node.js 24 until third-party actions (checkout, upload-artifact,
# ccache-action) bump their runtime. Node 20 is removed 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, dev-submodule, dev-hwip, dev-crc32]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-cpp-build
        with:
          preset: ${{ matrix.preset }}

      - name: Build & Test (${{ matrix.preset }})
        run: ./scripts/dev.sh check --preset ${{ matrix.preset }}

      - name: Install clang-tidy (dev-hwip only)
        if: matrix.preset == 'dev-hwip'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-tidy

      - name: Run clang-tidy (dev-hwip only)
        if: matrix.preset == 'dev-hwip'
        run: ./scripts/dev.sh lint --strict --preset dev-hwip

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/
          if-no-files-found: ignore

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-cpp-build
        with:
          preset: asan-ubsan

      - name: Configure & build
        run: |
          cmake --preset asan-ubsan
          cmake --build build/asan-ubsan -j"$(nproc)"

      - name: Run tests under ASan+UBSan
        env:
          ASAN_OPTIONS:  "detect_leaks=1:abort_on_error=1:halt_on_error=1:strict_string_checks=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: ctest --preset asan-ubsan

      - name: Upload sanitizer test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results-asan-ubsan
          path: build/asan-ubsan/Testing/
          if-no-files-found: ignore
