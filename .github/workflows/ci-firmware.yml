# SPDX-License-Identifier: Apache-2.0
name: CI / Firmware (Zephyr)


on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'hwip/accel/firmware/**'
      - 'west.yml'
      - '.github/workflows/ci-firmware.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**'
      - 'hwip/accel/firmware/**'
      - 'west.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  platform-firmware:
    name: Platform firmware
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.26.14

    env:
      # native_sim uses the host GCC toolchain inside the container.
      # The Zephyr SDK is available but not needed for native_sim.
      ZEPHYR_TOOLCHAIN_VARIANT: host

    steps:
      - uses: actions/checkout@v4
        with:
          path: deepspan

      - name: Install Python tools
        run: pip3 install --quiet natsort cmake jsonschema

      - name: West init & update
        working-directory: deepspan
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build firmware (native_sim/native/64)
        working-directory: deepspan
        run: |
          west build -b native_sim/native/64 firmware/app \
            -- -DCONFIG_ASSERT=y -DCONFIG_LOG=y \
               -DZEPHYR_EXTRA_MODULES=$(pwd)/firmware

      - name: Run Ztest (native_sim)
        working-directory: deepspan
        run: |
          west twister -T firmware/tests \
            --platform native_sim/native/64 \
            --inline-logs \
            -v

      - name: Upload twister results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-results
          path: deepspan/twister-out/

  hwip-firmware:
    name: HWIP Accel firmware
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:v0.27.4
    steps:
      - uses: actions/checkout@v4

      - name: Check hwip accel firmware exists
        id: check
        run: |
          if [ -d hwip/accel/firmware ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "hwip/accel/firmware not yet created — skipping build"
          fi

      - name: West init and update
        if: steps.check.outputs.skip == 'false'
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build HWIP accel firmware
        if: steps.check.outputs.skip == 'false'
        run: |
          west build \
            -b native_sim/native/64 \
            hwip/accel/firmware

      - name: Run native_sim tests
        if: steps.check.outputs.skip == 'false'
        run: west build --target run
