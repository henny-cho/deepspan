# SPDX-License-Identifier: Apache-2.0
# Reusable workflow: build Zephyr firmware for a HWIP plugin.
#
# Usage from HWIP repo:
#   jobs:
#     firmware:
#       uses: myorg/deepspan/.github/workflows/_reusable/hwip-firmware.yml@main
#       with:
#         hwip-type: accel
#         platform-ref: v0.3.0
name: HWIP Firmware Build (reusable)

on:
  workflow_call:
    inputs:
      hwip-type:
        description: HWIP type identifier (e.g. accel, codec)
        required: true
        type: string
      platform-ref:
        description: deepspan platform release tag or 'latest'
        default: 'latest'
        type: string
      board:
        description: Zephyr board target
        default: 'native_sim'
        type: string
      west-extra-modules:
        description: Additional West modules to import (space-separated paths)
        default: ''
        type: string

jobs:
  firmware:
    name: Firmware ${{ inputs.hwip-type }} (${{ inputs.board }})
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:v0.27.4
    steps:
      - uses: actions/checkout@v5

      - name: Download platform artifact
        run: |
          REF="${{ inputs.platform-ref }}"
          if [ "$REF" = "latest" ]; then
            gh release download --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          else
            gh release download "$REF" --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          fi
          mkdir -p /opt/deepspan-platform
          tar xzf /tmp/platform/deepspan-platform-*.tar.gz -C /opt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: West update
        run: |
          west init -l .
          west update --narrow

      - name: Build firmware
        run: |
          west build \
            -b ${{ inputs.board }} \
            ${{ inputs.hwip-type }}/firmware \
            -- -DDEESPAN_PLATFORM_DIR=/opt/deepspan-platform

      - name: Run native_sim tests
        if: inputs.board == 'native_sim'
        run: west build --target run
