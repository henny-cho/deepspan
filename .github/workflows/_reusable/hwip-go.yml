# SPDX-License-Identifier: Apache-2.0
# Reusable workflow: build and test Go server code for a HWIP plugin.
#
# Usage from HWIP repo:
#   jobs:
#     go-test:
#       uses: myorg/deepspan/.github/workflows/_reusable/hwip-go.yml@main
#       with:
#         hwip-type: accel
#         platform-ref: v0.3.0
name: HWIP Go Build & Test (reusable)

on:
  workflow_call:
    inputs:
      hwip-type:
        description: HWIP type identifier (e.g. accel, codec)
        required: true
        type: string
      platform-ref:
        description: deepspan platform release tag or 'latest'
        default: 'latest'
        type: string
      go-version:
        description: Go version to use
        default: '1.26'
        type: string
      server-path:
        description: Path to the HWIP server Go module (relative to repo root)
        default: ''
        type: string

env:
  GO_VERSION: ${{ inputs.go-version }}

jobs:
  go-test:
    name: Go ${{ inputs.hwip-type }} (${{ inputs.platform-ref }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: go.work.sum

      - name: Download platform Go module
        run: |
          REF="${{ inputs.platform-ref }}"
          if [ "$REF" = "latest" ]; then
            gh release download --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          else
            gh release download "$REF" --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          fi
          tar xzf /tmp/platform/deepspan-platform-*.tar.gz -C /opt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify go.work consistency
        run: go work sync

      - name: Check codegen stale
        run: |
          HWIP="${{ inputs.hwip-type }}"
          if [ -f "$HWIP/hwip.yaml" ]; then
            python3 -m deepspan_codegen generate \
              --descriptor "$HWIP/hwip.yaml" \
              --out "$HWIP/gen" \
              --target go
            git diff --exit-code "$HWIP/gen/" || \
              (echo "ERROR: Generated files are stale. Run deepspan-codegen and commit." && exit 1)
          fi

      - name: Build
        run: |
          SERVER_PATH="${{ inputs.server-path }}"
          if [ -z "$SERVER_PATH" ]; then
            SERVER_PATH="${{ inputs.hwip-type }}/server"
          fi
          go build ./...
        working-directory: ${{ inputs.server-path || format('{0}/server', inputs.hwip-type) }}

      - name: Test
        run: go test -v -race ./...
        working-directory: ${{ inputs.server-path || format('{0}/server', inputs.hwip-type) }}
