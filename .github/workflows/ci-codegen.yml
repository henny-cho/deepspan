# SPDX-License-Identifier: Apache-2.0
# CI: deepspan-codegen tool tests (TDD validation loop).
#
# Runs on every push/PR that touches the codegen tool or its templates.
name: CI / deepspan-codegen

on:
  push:
    branches: [main]
    paths:
      - 'codegen/**'
      - 'hwip/**/hwip.yaml'
      - '.github/workflows/ci-codegen.yml'
  pull_request:
    branches: [main]
    paths:
      - 'codegen/**'
      - 'hwip/**/hwip.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test deepspan-codegen (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-codegen-${{ matrix.python-version }}-${{ hashFiles('codegen/pyproject.toml') }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install deepspan-codegen with dev deps
        working-directory: codegen
        run: uv sync --extra dev 2>/dev/null || uv pip install -e ".[dev]"

      - name: Run TDD test suite
        working-directory: codegen
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --cov=deepspan_codegen \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: codegen-coverage
          path: codegen/coverage.xml

  lint:
    name: Lint deepspan-codegen
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-codegen-lint-${{ hashFiles('codegen/pyproject.toml') }}

      - name: Install with dev deps
        working-directory: codegen
        run: uv sync --extra dev 2>/dev/null || uv pip install -e ".[dev]"

      - name: ruff check
        working-directory: codegen
        run: uv run ruff check deepspan_codegen/ tests/

      - name: ruff format check
        working-directory: codegen
        run: uv run ruff format --check deepspan_codegen/ tests/

  integration:
    name: Integration — generate from accel hwip.yaml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install deepspan-codegen
        working-directory: codegen
        run: uv sync

      - name: Generate from embedded accel descriptor
        run: |
          cat > /tmp/accel_hwip.yaml << 'YAML'
          hwip:
            name: accel
            version: "1.0.0"
            namespace: deepspan_accel
          platform_registers:
            total_size: 0x200
            control_bank:
              - { name: ctrl, offset: 0x000, access: rw,
                  bits: [{name: RESET, pos: 0}, {name: START, pos: 1}] }
            command_bank:
              - { name: cmd_opcode, offset: 0x100, access: wo }
            result_bank:
              - { name: result_data0, offset: 0x114, access: ro }
          operations:
            - name: echo
              opcode: 0x0001
              proto_enum_value: 1
              doc: "Echo test"
              request:
                encoding: fixed_args
                fields: [{ name: arg0, type: u32 }]
              response:
                fields: [{ name: data0, type: u32 }]
          YAML
          uv run --directory codegen deepspan-codegen \
            --descriptor /tmp/accel_hwip.yaml --out /tmp/gen

      - name: Verify generated files exist
        run: |
          test -f /tmp/gen/kernel/deepspan_accel.h                      && echo "OK: C kernel header"
          test -f /tmp/gen/sim/deepspan_accel/ops.hpp                   && echo "OK: C++ hw_model header"
          test -f /tmp/gen/firmware/deepspan_accel/dispatch.h           && echo "OK: firmware dispatch header"
          test -f /tmp/gen/proto/deepspan_accel/v1/device.proto         && echo "OK: proto file"
          test -f /tmp/gen/rpc/accel.hpp                                && echo "OK: C++ RPC opcodes"
          test -f /tmp/gen/sdk/deepspan_accel/models.py                 && echo "OK: Python models"

      - name: Verify key content in generated files
        run: |
          grep -q "DEEPSPAN_ACCEL_OP_ECHO.*0x0001U" /tmp/gen/kernel/deepspan_accel.h
          echo "OK: C header has opcode macro"

          grep -q "ECHO = 0x0001U" /tmp/gen/sim/deepspan_accel/ops.hpp
          echo "OK: C++ hw_model enum has ECHO"

          grep -q "ACCEL_OP_UNSPECIFIED = 0" /tmp/gen/proto/deepspan_accel/v1/device.proto
          echo "OK: proto has UNSPECIFIED=0"

          grep -q "ECHO = 0x0001U" /tmp/gen/rpc/accel.hpp
          grep -q "proto_op_to_hw_op" /tmp/gen/rpc/accel.hpp
          echo "OK: C++ RPC opcodes have ECHO and proto_op_to_hw_op"

          python3 -m py_compile /tmp/gen/sdk/deepspan_accel/models.py
          echo "OK: Python syntax valid"

      - name: Generate from real hwip/accel/hwip.yaml (staleness check)
        run: |
          uv run --directory codegen deepspan-codegen \
            --descriptor "$GITHUB_WORKSPACE/hwip/accel/hwip.yaml" \
            --out /tmp/gen-accel-real
          echo "OK: generated from hwip/accel/hwip.yaml"

      - name: Verify real accel gen matches checked-in artifacts
        run: |
          # Check that key files exist in checked-in gen/ (artifacts not stale).
          for f in \
            hwip/accel/gen/kernel/deepspan_accel.h \
            hwip/accel/gen/sim/deepspan_accel/ops.hpp \
            hwip/accel/gen/proto/deepspan_accel/v1/device.proto \
            hwip/accel/gen/rpc/accel.hpp \
            hwip/accel/gen/sdk/deepspan_accel/models.py; do
            test -f "$f" && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done

      - name: Generate from real hwip/crc32/hwip.yaml (staleness check)
        run: |
          uv run --directory codegen deepspan-codegen \
            --descriptor "$GITHUB_WORKSPACE/hwip/crc32/hwip.yaml" \
            --out /tmp/gen-crc32-real
          echo "OK: generated from hwip/crc32/hwip.yaml"

      - name: Verify real crc32 gen matches checked-in artifacts
        run: |
          for f in \
            hwip/crc32/gen/kernel/deepspan_crc32.h \
            hwip/crc32/gen/sim/deepspan_crc32/ops.hpp \
            hwip/crc32/gen/proto/deepspan_crc32/v1/device.proto \
            hwip/crc32/gen/rpc/crc32.hpp \
            hwip/crc32/gen/sdk/deepspan_crc32/models.py; do
            test -f "$f" && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done
