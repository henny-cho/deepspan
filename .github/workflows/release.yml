# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      server--release_created: ${{ steps.rp.outputs['server--release_created'] }}
      mgmt-daemon--release_created: ${{ steps.rp.outputs['mgmt-daemon--release_created'] }}
      sdk--release_created: ${{ steps.rp.outputs['sdk--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser-server:
    name: Release server binary
    needs: release-please
    if: needs.release-please.outputs['server--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser (server)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: server
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser-mgmt:
    name: Release mgmt-daemon binary
    needs: release-please
    if: needs.release-please.outputs['mgmt-daemon--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser (mgmt-daemon)
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: mgmt-daemon
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish SDK to PyPI
    needs: release-please
    if: needs.release-please.outputs['sdk--release_created'] == 'true'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Build SDK wheel
        working-directory: sdk
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
