# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    branches: [main]

# Workflow-level permissions: required for release-please to open/update PRs
# and create tags+releases.
#
# ALSO REQUIRED (one-time repo setting):
#   Settings → Actions → General → Workflow permissions
#   → ✅ "Allow GitHub Actions to create and approve pull requests"
#
# If that setting cannot be enabled (org policy), create a PAT with
# repo + pull_request scope, store it as secrets.RELEASE_PLEASE_TOKEN,
# and replace ${{ secrets.GITHUB_TOKEN }} → ${{ secrets.RELEASE_PLEASE_TOKEN }}
# in the release-please step below.
permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  GO_VERSION: '1.26'

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    env:
      # release-please-action@v4 uses Node.js 20; force Node.js 24 until upstream releases a fix.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      l4-server--release_created: ${{ steps.rp.outputs['l4-server--release_created'] }}
      l4-mgmt-daemon--release_created: ${{ steps.rp.outputs['l4-mgmt-daemon--release_created'] }}
      l6-sdk--release_created: ${{ steps.rp.outputs['l6-sdk--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          # PR 생성 권한이 없는 환경에서 실패를 막기 위해 PR 생성을 건너뜀.
          # release-please는 릴리즈 태그·GitHub Release 생성만 수행한다.
          # PR 기반 changelog 자동화가 필요해지면 RELEASE_PLEASE_TOKEN (PAT)을
          # 시크릿으로 추가하고 아래 줄을 제거할 것.
          skip-github-pull-request: true

  goreleaser-server:
    name: Release server binary
    needs: release-please
    if: needs.release-please.outputs['l4-server--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: l4-server
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser-mgmt:
    name: Release mgmt-daemon binary
    needs: release-please
    if: needs.release-please.outputs['l4-mgmt-daemon--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: l4-mgmt-daemon
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish SDK to PyPI
    needs: release-please
    if: needs.release-please.outputs['l6-sdk--release_created'] == 'true'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publisher
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Build SDK wheel
        working-directory: sdk
        run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/

  platform-install-artifact:
    name: Build & upload platform install artifact
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build liburing-dev pkg-config

      - name: Build and install platform
        run: |
          cmake --preset release \
            -DCMAKE_INSTALL_PREFIX=dist/deepspan-platform \
            -DDEESPAN_BUILD_TESTS=OFF
          cmake --build --preset release -j$(nproc)
          cmake --install build/release

      - name: Package install artifact
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          tar czf "deepspan-platform-${TAG:-dev}.tar.gz" \
            -C dist deepspan-platform

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: deepspan-platform-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-hwip-compat:
    name: Trigger HWIP compatibility check
    needs: [release-please, platform-install-artifact]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Dispatch deepspan-hwip CI
        run: |
          gh workflow run ci-all.yml \
            --repo myorg/deepspan-hwip \
            --field platform_ref=${{ needs.release-please.outputs.tag_name }}
        env:
          # Cross-repo dispatch requires a PAT with repo + workflow scope.
          # Store as secrets.DISPATCH_PAT.
          GH_TOKEN: ${{ secrets.DISPATCH_PAT }}
