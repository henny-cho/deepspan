# SPDX-License-Identifier: Apache-2.0
name: Release


on:
  push:
    branches: [main]

# Workflow-level permissions: required for release-please to open/update PRs
# and create tags+releases.
#
# ALSO REQUIRED (one-time repo setting):
#   Settings → Actions → General → Workflow permissions
#   → ✅ "Allow GitHub Actions to create and approve pull requests"
#
# If that setting cannot be enabled (org policy), create a PAT with
# repo + pull_request scope, store it as secrets.RELEASE_PLEASE_TOKEN,
# and replace ${{ secrets.GITHUB_TOKEN }} → ${{ secrets.RELEASE_PLEASE_TOKEN }}
# in the release-please step below.
permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    env:
      # release-please-action@v4 uses Node.js 20; force Node.js 24 until upstream releases a fix.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      server--release_created: ${{ steps.rp.outputs['server--release_created'] }}
      mgmt-daemon--release_created: ${{ steps.rp.outputs['mgmt-daemon--release_created'] }}
      sdk--release_created: ${{ steps.rp.outputs['sdk--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # Explicitly pass token so GitHub can attribute PR creation to the
          # Actions bot. Swap to secrets.RELEASE_PLEASE_TOKEN (PAT) if the
          # organisation disables "Allow Actions to create pull requests".
          token: ${{ secrets.GITHUB_TOKEN }}

  goreleaser-server:
    name: Release server binary
    needs: release-please
    if: needs.release-please.outputs['server--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run GoReleaser (server)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          workdir: server
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser-mgmt:
    name: Release mgmt-daemon binary
    needs: release-please
    if: needs.release-please.outputs['mgmt-daemon--release_created'] == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run GoReleaser (mgmt-daemon)
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: mgmt-daemon
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish SDK to PyPI
    needs: release-please
    if: needs.release-please.outputs['sdk--release_created'] == 'true'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publisher
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: Build SDK wheel
        working-directory: sdk
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
