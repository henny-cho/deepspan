# SPDX-License-Identifier: Apache-2.0
# Reusable workflow: build and test a C++ HWIP plugin.
#
# Usage from HWIP repo:
#   jobs:
#     build:
#       uses: myorg/deepspan/.github/workflows/_reusable/hwip-cpp.yml@main
#       with:
#         hwip-type: accel
#         platform-ref: v0.3.0
name: HWIP C++ Build & Test (reusable)

on:
  workflow_call:
    inputs:
      hwip-type:
        description: HWIP type identifier (e.g. accel, codec)
        required: true
        type: string
      platform-ref:
        description: deepspan platform release tag or 'latest'
        default: 'latest'
        type: string
      cmake-preset:
        description: CMake preset name to use
        default: ''
        type: string
      extra-apt-packages:
        description: Space-separated extra apt packages to install
        default: ''
        type: string

jobs:
  build:
    name: C++ ${{ inputs.hwip-type }} (${{ inputs.platform-ref }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config ${{ inputs.extra-apt-packages }}

      - name: Download platform artifact
        run: |
          REF="${{ inputs.platform-ref }}"
          if [ "$REF" = "latest" ]; then
            gh release download --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          else
            gh release download "$REF" --repo myorg/deepspan \
              --pattern 'deepspan-platform-*.tar.gz' \
              --dir /tmp/platform
          fi
          tar xzf /tmp/platform/deepspan-platform-*.tar.gz -C /opt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure
        run: |
          PRESET="${{ inputs.cmake-preset }}"
          if [ -z "$PRESET" ]; then
            PRESET="${{ inputs.hwip-type }}-dev"
          fi
          cmake --preset "$PRESET" \
            -DDEESPAN_PLATFORM_DIR=/opt/deepspan-platform

      - name: Build
        run: |
          PRESET="${{ inputs.cmake-preset }}"
          if [ -z "$PRESET" ]; then
            PRESET="${{ inputs.hwip-type }}-dev"
          fi
          cmake --build --preset "$PRESET" -j$(nproc)

      - name: Test
        run: |
          PRESET="${{ inputs.cmake-preset }}"
          if [ -z "$PRESET" ]; then
            PRESET="${{ inputs.hwip-type }}-dev"
          fi
          ctest --preset "$PRESET" --output-on-failure
