# SPDX-License-Identifier: Apache-2.0
name: CI / Python SDK

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'api/proto/**'
      - 'codegen/**'
      - 'hwip/**/hwip.yaml'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'api/proto/**'
      - 'codegen/**'
      - 'hwip/**/hwip.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler protobuf-compiler-grpc

      - uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-sdk-${{ matrix.python-version }}-${{ hashFiles('sdk/pyproject.toml') }}

      - name: Install SDK with dev deps
        working-directory: sdk
        run: uv sync --extra dev

      - name: Generate gRPC proto stubs
        run: uv run --directory sdk --with grpcio-tools python scripts/gen_proto.py

      - name: Run tests
        working-directory: sdk
        run: uv run pytest --tb=short -v

      - name: Upload coverage
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: sdk/.coverage
