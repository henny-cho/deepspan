# SPDX-License-Identifier: Apache-2.0
name: CI / Full-Stack Integration

on:
  push:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'server/**'
      - 'hwip/**'
      - 'gen/go/**'
      - 'gen/hwip/**'
      - 'mgmt-daemon/**'
      - 'sdk/**'
      - 'proto/**'
      - 'scripts/test-fullstack.sh'
      - '.github/workflows/ci-fullstack.yml'
  pull_request:
    branches: [main]
    paths:
      - 'hw-model/**'
      - 'server/**'
      - 'hwip/**'
      - 'gen/go/**'
      - 'gen/hwip/**'
      - 'mgmt-daemon/**'
      - 'sdk/**'
      - 'proto/**'
      - 'scripts/test-fullstack.sh'

env:
  GO_VERSION: '1.26'

jobs:
  fullstack:
    name: Full-Stack (${{ matrix.hwip }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        hwip: [accel]
        # Add new hwip types here once their skeleton is complete:
        # hwip: [accel, codec]

    steps:
      - uses: actions/checkout@v5

      # ── C++ toolchain ──────────────────────────────────────────────────────
      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build liburing-dev libgtest-dev pkg-config \
            curl python3

      # ── Go ─────────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            server/go.sum
            mgmt-daemon/go.sum
            hwip/accel/server/go.sum
            gen/go/go.sum
            gen/hwip/accel/go/go.sum

      # ── Python SDK ─────────────────────────────────────────────────────────
      - uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python SDK environment
        working-directory: sdk
        run: uv sync

      # ── Full-stack test ────────────────────────────────────────────────────
      - name: Run full-stack integration test
        run: |
          chmod +x scripts/test-fullstack.sh
          scripts/test-fullstack.sh --hwip ${{ matrix.hwip }}

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fullstack-logs-${{ matrix.hwip }}
          path: build/logs/fullstack/
          retention-days: 7
