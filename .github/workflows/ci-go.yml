# SPDX-License-Identifier: Apache-2.0
name: CI / Go

on:
  push:
    branches: [main]
    paths:
      - 'l4-mgmt-daemon/**'
      - 'l4-server/**'
      - 'l5-gen/go/**'
      - 'go.work'
      - 'scripts/lib.sh'
      - 'scripts/gate.sh'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'l4-mgmt-daemon/**'
      - 'l4-server/**'
      - 'l5-gen/go/**'
      - 'go.work'
      - 'scripts/lib.sh'
      - 'scripts/gate.sh'

env:
  GO_VERSION: '1.26'
  GOLANGCI_VERSION: 'v2.11.3'

jobs:
  test:
    name: Test (${{ matrix.slug }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: l4-mgmt-daemon
            slug: l4-mgmt-daemon
          - module: l4-server
            slug: l4-server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            ${{ matrix.module }}/go.sum
            l5-gen/go/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-coverage-${{ matrix.slug }}
          path: ${{ matrix.module }}/coverage.out

  lint:
    name: Lint (gate.sh)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            l4-mgmt-daemon/go.sum
            l4-server/go.sum
            l5-gen/go/go.sum

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_VERSION }}

      - name: Lint via gate.sh
        run: ./scripts/gate.sh lint
