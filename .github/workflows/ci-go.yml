# SPDX-License-Identifier: Apache-2.0
name: CI / Go

on:
  push:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'gen/go/**'
      - 'go.work'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'gen/go/**'
      - 'go.work'

env:
  GO_VERSION: '1.26'
  GOLANGCI_VERSION: 'v2.11.3'

jobs:
  test:
    name: Test (${{ matrix.slug }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: mgmt-daemon
            slug: mgmt-daemon
          - module: server
            slug: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            ${{ matrix.module }}/go.sum
            gen/go/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-coverage-${{ matrix.slug }}
          path: ${{ matrix.module }}/coverage.out

  lint:
    name: Lint (${{ matrix.slug }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: mgmt-daemon
            slug: mgmt-daemon
          - module: server
            slug: server

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            ${{ matrix.module }}/go.sum
            gen/go/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.module }}
          version: ${{ env.GOLANGCI_VERSION }}
