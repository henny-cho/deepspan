# SPDX-License-Identifier: Apache-2.0
name: CI / Go

on:
  push:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'hwip/**/server/**'
      - 'gen/go/**'
      - 'gen/hwip/**'
      - 'go.work'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'hwip/**/server/**'
      - 'gen/go/**'
      - 'gen/hwip/**'
      - 'go.work'

jobs:
  test:
    name: Test Go (${{ matrix.module }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module: [mgmt-daemon, server, hwip/accel/server]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            ${{ matrix.module }}/go.sum
            gen/go/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: go-coverage-${{ replace(matrix.module, '/', '-') }}
          path: ${{ matrix.module }}/coverage.out

  lint:
    name: Lint Go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            mgmt-daemon/go.sum
            server/go.sum
            gen/go/go.sum
      - name: golangci-lint (mgmt-daemon)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: mgmt-daemon
          version: v2.11.3
      - name: golangci-lint (server)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: server
          version: v2.11.3
      - name: golangci-lint (hwip/accel/server)
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: hwip/accel/server
          version: v2.11.3
