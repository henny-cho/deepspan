# SPDX-License-Identifier: Apache-2.0
name: CI / Go

on:
  push:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'gen/go/**'
      - '.github/workflows/ci-go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mgmt-daemon/**'
      - 'server/**'
      - 'gen/go/**'

jobs:
  test:
    name: Test Go services
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module: [mgmt-daemon, server]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: deepspan/${{ matrix.module }}/go.sum

      - name: Download dependencies
        working-directory: deepspan/${{ matrix.module }}
        run: go mod download

      - name: Build
        working-directory: deepspan/${{ matrix.module }}
        run: go build ./...

      - name: Test
        working-directory: deepspan/${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.module }}
          path: deepspan/${{ matrix.module }}/coverage.out

  lint:
    name: Lint Go
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: golangci-lint (mgmt-daemon)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: deepspan/mgmt-daemon
          version: latest
      - name: golangci-lint (server)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: deepspan/server
          version: latest
