# SPDX-License-Identifier: Apache-2.0
name: CI / Kernel Driver


on:
  push:
    branches: [main]
    paths:
      - 'l2-kernel/**'
      - '.github/workflows/ci-kernel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'l2-kernel/**'

jobs:
  kunit:
    name: KUnit Tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install kernel build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            linux-headers-$(uname -r) build-essential flex bison \
            libelf-dev libssl-dev bc

      - name: Run KUnit tests (UML target)
        working-directory: kernel
        run: |
          # Use kunit_tool to build and run tests in UML
          # Requires kernel source — use a pre-built KUnit runner in CI
          # For now: compile-check the out-of-tree module
          make -C /lib/modules/$(uname -r)/build \
            M=$(pwd)/drivers/deepspan \
            EXTRA_CFLAGS="-DKUNIT_MOCK" \
            modules 2>&1 | tee build.log
          grep -v "^  " build.log | grep -i "error" && exit 1 || true

      - name: Upload kernel build log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: kernel-build-log
          path: kernel/build.log
