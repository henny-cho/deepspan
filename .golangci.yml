# golangci-lint configuration shared by all Go modules in this workspace.
# Run: golangci-lint run ./...  (from mgmt-daemon/ or server/)

version: "2"

linters:
  default: standard   # includes errcheck, govet, ineffassign, staticcheck, unused

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0   # report all issues, not just the first N
  max-same-issues: 0
