# native_sim target-specific configuration (simulation)
CONFIG_DEEPSPAN_TRANSPORT_SIM=y
CONFIG_DEEPSPAN_TRANSPORT_VIRTIO=n

# HWIP sim driver: connects to hw-model via POSIX shm
CONFIG_DEEPSPAN_HWIP_DRIVER_SIM=y
CONFIG_DEEPSPAN_HWIP_SIM_SHM_NAME="deepspan-sim"

# Disable CIB on native_sim — it requires a full hosted C++ stdlib
# (std::uint64_t in string_constant.hpp) not available in Zephyr freestanding mode
# CONFIG_DEEPSPAN_USE_CIB is not set

# native_sim only
CONFIG_NATIVE_APPLICATION=y
CONFIG_POSIX_API=y

# Verbose log level
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_TEST_LOGGING=y
