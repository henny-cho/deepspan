# SPDX-License-Identifier: Apache-2.0
# Buf workspace configuration for deepspan-hwip (proto lint only).
#
# Stage 1 (hwip.yaml → gen/proto/) is done by deepspan-codegen.
# Proto stubs are generated at CMake build time via protobuf_generate()
# — no buf generate step is needed for C++ or Python.
#
# This file is only used for: buf lint (proto validation).
# Run: buf lint --config hwip/buf.yaml accel/gen/proto/
version: v2

modules:
  # Stage 1 output: generated proto files for each HWIP type.
  # Add an entry here for each HWIP type that has generated protos.
  - path: accel/gen/proto
    name: buf.build/myorg/deepspan-accel

lint:
  use:
    - DEFAULT
  except:
    - FIELD_NOT_REQUIRED
    - PACKAGE_VERSION_SUFFIX

breaking:
  use:
    - FILE
