# SPDX-License-Identifier: Apache-2.0
# deepspan-hwip/crc32/hwip.yaml — single source of truth for crc32 HWIP API
#
# This file is the authoritative definition of the crc32 HWIP interface.
# Run `deepspan-codegen generate --descriptor hwip.yaml --out gen/` to
# regenerate all language artifacts in gen/.

hwip:
  name: crc32
  version: "1.0.0"
  namespace: deepspan_crc32

platform_registers:              # deepspan::hw_model::RegMap layout
  total_size: 0x200
  control_bank:
    - { name: ctrl,         offset: 0x000, size: 32, access: rw,
        bits: [{name: RESET, pos: 0}, {name: START, pos: 1}, {name: IRQ_CLR, pos: 2}],
        doc: "Control register" }
    - { name: status,       offset: 0x004, size: 32, access: ro,
        bits: [{name: READY, pos: 0}, {name: BUSY, pos: 1}, {name: ERROR, pos: 2}],
        doc: "Status register" }
    - { name: irq_status,   offset: 0x008, size: 32, access: w1c,
        bits: [{name: DONE, pos: 0}],
        doc: "IRQ status (write-1-to-clear)" }
    - { name: irq_enable,   offset: 0x00C, size: 32, access: rw,
        bits: [{name: DONE, pos: 0}],
        doc: "IRQ enable mask" }
    - { name: version,      offset: 0x010, size: 32, access: ro,
        doc: "Hardware version register (major<<16 | minor)" }
    - { name: capabilities, offset: 0x014, size: 32, access: ro,
        bits: [{name: DMA, pos: 0}, {name: IRQ, pos: 1}],
        doc: "Hardware capability flags" }
  command_bank:
    - { name: cmd_opcode, offset: 0x100, size: 32, access: wo,
        doc: "Command opcode register" }
    - { name: cmd_arg0,   offset: 0x104, size: 32, access: wo,
        doc: "compute: data length in bytes; get_poly: unused" }
    - { name: cmd_arg1,   offset: 0x108, size: 32, access: wo,
        doc: "Reserved" }
    - { name: cmd_flags,  offset: 0x10C, size: 32, access: wo,
        doc: "Command flags" }
  result_bank:
    - { name: result_status, offset: 0x110, size: 32, access: ro,
        doc: "Result status code" }
    - { name: result_data0,  offset: 0x114, size: 32, access: ro,
        doc: "CRC32 checksum (compute) or polynomial value (get_poly)" }
    - { name: result_data1,  offset: 0x118, size: 32, access: ro,
        doc: "Reserved" }

operations:
  - name: compute
    opcode: 0x0001
    proto_enum_value: 1
    doc: "Compute CRC32 over byte stream (IEEE 802.3 poly 0xEDB88320)"
    request:
      encoding: dma_bytes
      fields:
        - { name: data, type: bytes, max_bytes: 3072 }
    response:
      fields:
        - { name: checksum, type: u32, maps_to: result_data0 }

  - name: get_poly
    opcode: 0x0002
    proto_enum_value: 2
    doc: "Return current CRC polynomial (default: 0xEDB88320 = IEEE 802.3)"
    request:
      encoding: fixed_args
      fields: []
    response:
      fields:
        - { name: polynomial, type: u32, maps_to: result_data0 }
