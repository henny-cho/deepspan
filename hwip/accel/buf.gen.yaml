version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/myorg/deepspan/gen/hwip/accel/go

plugins:
  # ── Go ───────────────────────────────────────────────────────────────────────
  - local: protoc-gen-go
    out: ../../../gen/hwip/accel/go
    opt:
      - paths=source_relative

  - local: protoc-gen-connect-go
    out: ../../../gen/hwip/accel/go
    opt:
      - paths=source_relative

  # ── Python ───────────────────────────────────────────────────────────────────
  - remote: buf.build/protocolbuffers/python
    out: ../../../gen/hwip/accel/python
    opt:
      - paths=source_relative
