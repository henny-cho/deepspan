# SPDX-License-Identifier: Apache-2.0
version: 2

project_name: deepspan-mgmt-daemon

before:
  hooks:
    - go mod tidy

builds:
  - id: mgmt-daemon
    main: ./cmd/mgmt-daemon
    binary: deepspan-mgmt-daemon
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

archives:
  - name_template: "deepspan-mgmt-daemon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "deepspan-mgmt-daemon_{{ .Version }}_checksums.txt"
